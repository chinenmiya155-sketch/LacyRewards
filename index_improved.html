<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rewards Hub</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;overflow:hidden;color:#fff}
body::before{content:"";position:fixed;inset:-50%;background:
linear-gradient(45deg,#0f172a,#312e81,#0ea5e9,#0f172a);
background-size:300% 300%;animation:bg 14s ease infinite;z-index:-2}
body::after{content:"";position:fixed;inset:0;background:
radial-gradient(circle at 20% 20%,rgba(255,255,255,.08),transparent 20%),
radial-gradient(circle at 80% 30%,rgba(255,255,255,.06),transparent 18%),
radial-gradient(circle at 50% 80%,rgba(255,255,255,.05),transparent 22%);
animation:float 12s linear infinite alternate;z-index:-1}
@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
@keyframes float{from{transform:translateY(0)}to{transform:translateY(-40px)}}
.wrap{display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{width:min(92vw,430px);background:rgba(255,255,255,.12);backdrop-filter:blur(14px);padding:28px;border-radius:22px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
h1,h2{text-align:center}input,button{width:100%;padding:14px;border:0;border-radius:12px;font-size:16px}
input{margin:16px 0;background:#1e293bcc;color:#fff}
button{background:linear-gradient(90deg,#6366f1,#06b6d4);color:#fff;cursor:pointer;transition:.25s}
button:hover{transform:translateY(-2px) scale(1.02)}
.hidden{display:none}.task{margin-top:10px}.done{background:#16a34a!important}
.bar{height:10px;background:#223;border-radius:999px;overflow:hidden;margin:10px 0 20px}
.fill{height:100%;width:0;background:linear-gradient(90deg,#22c55e,#86efac);transition:.4s}
#done{animation:pop .5s}.confetti{font-size:28px;text-align:center;animation:pop .6s}
@keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
</style></head>
<body><div class="wrap"><div class="card">
<div id="login"><h1>🎁 Rewards Hub</h1><p>Complete all 4 tasks.</p>
<input id="nick" placeholder="Enter your username"><button onclick="start()">Continue</button></div>
<div id="tasks" class="hidden"><h2 id="hello"></h2>
<div>Progress <span id="txt">0/4</span></div><div class="bar"><div id="fill" class="fill"></div></div>
<button class="task" onclick="go(0,this)">Task 1</button>
<button class="task" onclick="go(1,this)">Task 2</button>
<button class="task" onclick="go(2,this)">Task 3</button>
<button class="task" onclick="go(3,this)">Task 4</button>
<div id="done" class="hidden"><div class="confetti">🎉✨🎊</div><h2>Congratulations! All tasks completed.</h2></div>
</div></div></div>
<script>
const links=["https://example.com/1","https://example.com/2","https://example.com/3","https://example.com/4"];
let s=[0,0,0,0];
function start(){const n=nick.value.trim();if(!n)return alert("Enter username");login.classList.add("hidden");tasks.classList.remove("hidden");hello.textContent="Hello, "+n+" 👋";}
function go(i,b){window.open(links[i],"_blank");if(s[i])return;s[i]=1;b.textContent="✓ Completed";b.classList.add("done");let c=s.reduce((a,v)=>a+v,0);txt.textContent=c+"/4";fill.style.width=(c*25)+"%";if(c===4)done.classList.remove("hidden");}
</script></body></html>
